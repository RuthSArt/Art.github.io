<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film | Filmemacherin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1a2e12 0%, #355c22 50%, #0e1a0a 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #f3f3f3;
        }

        header {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            overflow: hidden;
            padding-top: 40px;
        }

        .word-nav {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 50px;
        }

        .word-nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 1.6em;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.85;
            transition: opacity 0.3s ease;
        }

        .word-nav a:hover { opacity: 1; }
        .word-nav a.active { color: #a6e785; }

        /* Wortwechsel in unterschiedlicher Geschwindigkeit */
        .word-nav a:nth-child(1) { animation: bob 6s ease-in-out infinite; }
        .word-nav a:nth-child(2) { animation: bob 4s ease-in-out infinite; }
        .word-nav a:nth-child(3) { animation: bob 5.5s ease-in-out infinite; }
        .word-nav a:nth-child(4) { animation: bob 3.5s ease-in-out infinite; }

        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-16px); }
        }

        .hero-image {
            width: 100%;
            max-width: 700px;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
        }

        .content {
            position: relative;
            z-index: 10;
            max-width: 700px;
            padding: 40px;
        }

        h1 {
            font-size: 3.5em;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .description {
            font-size: 1.2em;
            line-height: 1.8;
            margin-bottom: 40px;
            opacity: 0.95;
        }

        .nav-back {
            display: inline-block;
            margin-top: 30px;
            padding: 14px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .nav-back:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5em; }
            .description { font-size: 1em; }
            .word-nav a { font-size: 1.2em; }
        }
    </style>
</head>
<body>
    <header>
        <nav class="word-nav">
            <a href="spiel.html">Spiel</a>
            <a href="art.html">Kunst</a>
            <a href="wort.html">Wort</a>
            <a href="film.html" class="active">Film</a>
        </nav>

        <img class="hero-image" src="images/FilmBorges.jpg" alt="Ruth Spichtig – Film">

        <div class="content">
            <h1>Film</h1>
            <div class="description">
                <p>Filmemacherei ist das Zusammenspiel von Bild, Ton und Zeit. Eine Geschichte erzählen durch Bilder, die das Herz berühren und den Geist bewegen.</p>
                <p style="margin-top: 20px;">Jeder Frame ist eine Komposition, jede Szene ein Gedanke, jeder Film eine vollständige Welt.</p>
            </div>
            <a href="index.html" class="nav-back">← Zurück</a>
        </div>
    </header>
</body>
</html>
